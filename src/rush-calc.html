<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跑路计算器</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
<style>
/* ===== Reset & Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: #333;
}

/* ===== Card Container ===== */
.card {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(244, 143, 177, 0.3);
  width: 100%;
  max-width: 480px;
  padding: 40px 32px;
  position: relative;
}

/* ===== Page Toggles ===== */
.form-page, .result-page { display: none; }
.form-page.active, .result-page.active { display: block; }

/* ===== Typography ===== */
.page-title {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-subtitle {
  text-align: center;
  color: #999;
  font-size: 14px;
  margin-bottom: 32px;
}

/* ===== Form Styles ===== */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
  font-weight: 500;
}
.form-group label .emoji { font-size: 18px; }
.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #f0f0f0;
  border-radius: 14px;
  font-size: 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #fafafa;
}
.form-group input:focus {
  outline: none;
  border-color: #f5576c;
  box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.15);
  background: #fff;
}

/* ===== Button ===== */
.btn-primary {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  margin-top: 10px;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
}
.btn-primary:active { transform: translateY(0); }

/* ===== Error Message ===== */
.error-msg {
  color: #f5576c;
  font-size: 13px;
  margin-top: 4px;
  display: none;
}
.error-msg.show { display: block; }

/* ===== Result Page Styles ===== */
.settings-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: background 0.2s;
}
.settings-btn:hover { background: #f5f5f5; }

.motto-area {
  text-align: center;
  margin-bottom: 30px;
  padding: 16px;
  background: linear-gradient(135deg, #fff0f3, #ffe4ec);
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  color: #f5576c;
}

.result-date-area {
  text-align: center;
  margin-bottom: 36px;
}
.result-label {
  font-size: 14px;
  color: #999;
  margin-bottom: 8px;
}
.result-date {
  font-size: 36px;
  font-weight: 800;
  color: #1a1a2e;
  margin-bottom: 8px;
}
.result-days {
  font-size: 18px;
  color: #666;
}
.result-days span {
  font-weight: 700;
  color: #f5576c;
}

/* ===== Circle Progress ===== */
.circle-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 10px;
}
.circle-container {
  position: relative;
  width: 220px;
  height: 220px;
}
.circle-container svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.circle-bg {
  fill: none;
  stroke: #f0f0f0;
  stroke-width: 14;
}
.circle-progress {
  fill: none;
  stroke: url(#pinkGrad);
  stroke-width: 14;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.3s ease;
}
.circle-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.circle-time {
  font-size: 26px;
  font-weight: 800;
  color: #1a1a2e;
  font-variant-numeric: tabular-nums;
}
.circle-label {
  font-size: 13px;
  color: #999;
  margin-top: 6px;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  body { padding: 12px; align-items: flex-start; padding-top: 24px; }
  .card { padding: 28px 20px; border-radius: 20px; }
  .page-title { font-size: 24px; }
  .form-group input { padding: 12px 14px; font-size: 15px; }
  .btn-primary { padding: 14px; font-size: 16px; }
  .result-date { font-size: 28px; }
  .result-days { font-size: 16px; }
  .circle-container { width: 180px; height: 180px; }
  .circle-time { font-size: 22px; }
  .motto-area { font-size: 14px; padding: 12px; }
}
</style>
</head>
<body>

<div class="card">
  <!-- ===== Form Page ===== -->
  <div class="form-page active" id="formPage">
    <h1 class="page-title">跑路计算器</h1>
    <p class="page-subtitle">计算你的财务自由倒计时 🚀</p>

    <form id="runawayForm">
      <div class="form-group">
        <label for="targetAmount"><span class="emoji">🎯</span> 目标存款</label>
        <input type="number" id="targetAmount" placeholder="例如：500000" min="0" step="1" aria-describedby="err-target" required>
        <div class="error-msg" id="err-target">请输入有效的目标存款金额</div>
      </div>

      <div class="form-group">
        <label for="currentAmount"><span class="emoji">🏦</span> 已有存款</label>
        <input type="number" id="currentAmount" placeholder="例如：50000" min="0" step="1" aria-describedby="err-current" required>
        <div class="error-msg" id="err-current">请输入有效的已有存款金额</div>
      </div>

      <div class="form-group">
        <label for="monthlyAmount"><span class="emoji">📅</span> 每月存款</label>
        <input type="number" id="monthlyAmount" placeholder="例如：10000" min="0" step="1" aria-describedby="err-monthly" required>
        <div class="error-msg" id="err-monthly">请输入有效的每月存款金额（需大于0）</div>
      </div>

      <div class="form-group">
        <label for="onworkTime"><span class="emoji">🕘</span> 上班时间</label>
        <input type="time" id="onworkTime" value="09:00" required>
        <div class="error-msg" id="err-time">上班时间需早于下班时间</div>
      </div>

      <div class="form-group">
        <label for="offworkTime"><span class="emoji">🕕</span> 下班时间</label>
        <input type="time" id="offworkTime" value="18:00" aria-describedby="err-offwork" required>
        <div class="error-msg" id="err-offwork">请输入有效的下班时间</div>
      </div>

      <button type="submit" class="btn-primary">冲！💨</button>
    </form>
  </div>

  <!-- ===== Result Page ===== -->
  <div class="result-page" id="resultPage">
    <button class="settings-btn" id="settingsBtn" title="修改参数" aria-label="修改参数">⚙️</button>

    <div class="motto-area" id="mottoArea"></div>

    <div class="result-date-area">
      <div class="result-label">最终跑路时间</div>
      <div class="result-date" id="resultDate"></div>
      <div class="result-days" id="resultDays"></div>
    </div>

    <div class="circle-wrapper">
      <div class="circle-container">
        <svg viewBox="0 0 220 220">
          <defs>
            <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#f093fb"/>
              <stop offset="100%" style="stop-color:#f5576c"/>
            </linearGradient>
          </defs>
          <circle class="circle-bg" cx="110" cy="110" r="95"/>
          <circle class="circle-progress" id="circleProgress" cx="110" cy="110" r="95"
                  stroke-dasharray="596.903" stroke-dashoffset="596.903"/>
        </svg>
        <div class="circle-text">
          <div class="circle-time" id="circleTime">--:--:--</div>
          <div class="circle-label" id="circleLabel">下班倒计时</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'runaway_calculator_data';

  // ===== DOM Elements =====
  const formPage = document.getElementById('formPage');
  const resultPage = document.getElementById('resultPage');
  const form = document.getElementById('runawayForm');
  const settingsBtn = document.getElementById('settingsBtn');

  const targetInput = document.getElementById('targetAmount');
  const currentInput = document.getElementById('currentAmount');
  const monthlyInput = document.getElementById('monthlyAmount');
  const onworkInput = document.getElementById('onworkTime');
  const offworkInput = document.getElementById('offworkTime');

  const errTarget = document.getElementById('err-target');
  const errCurrent = document.getElementById('err-current');
  const errMonthly = document.getElementById('err-monthly');
  const errTime = document.getElementById('err-time');
  const errOffwork = document.getElementById('err-offwork');

  // ===== localStorage =====
  function saveData() {
    const data = {
      targetAmount: targetInput.value,
      currentAmount: currentInput.value,
      monthlyAmount: monthlyInput.value,
      onworkTime: onworkInput.value,
      offworkTime: offworkInput.value,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }

  function populateForm() {
    const data = loadData();
    if (!data) return;
    targetInput.value = data.targetAmount || '';
    currentInput.value = data.currentAmount || '';
    monthlyInput.value = data.monthlyAmount || '';
    onworkInput.value = data.onworkTime || '';
    offworkInput.value = data.offworkTime || '';
  }

  // ===== View Switching =====
  function showResult() {
    formPage.classList.remove('active');
    resultPage.classList.add('active');
    initResult();
  }

  function showForm() {
    resultPage.classList.remove('active');
    formPage.classList.add('active');
    stopTimer();
  }

  // ===== Form Validation =====
  function validateForm() {
    let valid = true;
    errTarget.classList.remove('show');
    errCurrent.classList.remove('show');
    errMonthly.classList.remove('show');
    errTime.classList.remove('show');
    errOffwork.classList.remove('show');

    const target = parseFloat(targetInput.value);
    const current = parseFloat(currentInput.value);
    const monthly = parseFloat(monthlyInput.value);
    const onwork = onworkInput.value;
    const offwork = offworkInput.value;

    if (isNaN(target) || target <= 0) {
      errTarget.textContent = '请输入有效的目标存款金额';
      errTarget.classList.add('show');
      valid = false;
    }
    if (isNaN(current) || current < 0) {
      errCurrent.textContent = '请输入有效的已有存款金额';
      errCurrent.classList.add('show');
      valid = false;
    }
    if (isNaN(monthly) || monthly <= 0) {
      errMonthly.classList.add('show');
      valid = false;
    }
    if (onwork && offwork && onwork >= offwork) {
      errTime.classList.add('show');
      valid = false;
    }

    return valid;
  }

  // ===== Form Submit =====
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (!validateForm()) return;
    saveData();
    showResult();
  });

  settingsBtn.addEventListener('click', showForm);

  // ===== Calculations =====
  function calcRunawayDate() {
    const target = parseFloat(targetInput.value);
    const current = parseFloat(currentInput.value) || 0;
    const monthly = parseFloat(monthlyInput.value);

    if (current >= target) {
      return { months: 0, days: 0, date: new Date() };
    }

    const remaining = target - current;
    const monthsNeeded = Math.ceil(remaining / monthly);

    const now = new Date();
    const targetDate = new Date(now.getFullYear(), now.getMonth() + monthsNeeded, now.getDate());
    const diffMs = targetDate.getTime() - now.getTime();
    const daysLeft = Math.floor(diffMs / (1000 * 60 * 60 * 24));

    return { months: monthsNeeded, days: daysLeft, date: targetDate };
  }

  function formatMotto(result) {
    const current = parseFloat(currentInput.value) || 0;
    const target = parseFloat(targetInput.value);
    if (current >= target) return '还上啥班啊，跑路 🎉';

    const now = new Date();
    const offwork = offworkInput.value;
    const [offH, offM] = offwork.split(':').map(Number);
    const offTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), offH, offM);

    if (now > offTime) return '别卷了，该走了 🏃💨';
    if (result.days <= 30) return '快了快了，胜利在望！🔥';
    if (result.days <= 365) return '坚持住，好日子不远了！💪';
    return '冲！每一笔存款都是自由的基石 🚀';
  }

  // ===== Result Page DOM references =====
  const mottoArea = document.getElementById('mottoArea');
  const resultDateEl = document.getElementById('resultDate');
  const resultDaysEl = document.getElementById('resultDays');

  function initResult() {
    const result = calcRunawayDate();

    // Motto
    mottoArea.textContent = formatMotto(result);

    // Date display
    const now = new Date();
    const d = result.forever ? new Date(now.getFullYear() + 50, now.getMonth(), now.getDate()) : result.date;
    const dateStr = d.getFullYear() + '年' + String(d.getMonth() + 1).padStart(2, '0') + '月';
    resultDateEl.textContent = dateStr;

    if (result.days <= 0) {
      resultDaysEl.innerHTML = '<span>已达成！现在就跑！🎉</span>';
    } else {
      const years = Math.floor(result.months / 12);
      let tips = '';
      if (result.months >= 50 * 12) {
        tips = '</br>' + years + '年？建议下次选简单模式 🔄';
      } else if (result.months >= 40 * 12) {
        tips = '</br>' + years + '年？半辈子都在打工了 💀';
      } else if (result.months >= 30 * 12) {
        tips = '</br>' + years + '年？够熬完三个本命年了 🐉';
      } else if (result.months >= 20 * 12) {
        tips = '</br>' + years + '年？孩子都能打酱油了 👶';
      } else if (result.months >= 10 * 12) {
        tips = '</br>' + years + '年？没事，头发掉完就到了 🧑‍🦲';
      } else {
        tips = '</br>' + years + '年，咬咬牙就过去了 💪';
      }

      resultDaysEl.innerHTML = '还剩 <span>' + result.days + '</span> 天' + tips;
    }

    // Start countdown timer
    startCountdown();
  }

  // ===== Countdown Timer =====
  const circleProgress = document.getElementById('circleProgress');
  const circleTimeEl = document.getElementById('circleTime');
  const circleLabel = document.getElementById('circleLabel');
  const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * 95;
  let timerId = null;

  function stopTimer() {
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
    }
  }

  function startCountdown() {
    stopTimer();
    updateCountdown();
    timerId = setInterval(updateCountdown, 1000);
  }

  function updateCountdown() {
    const now = new Date();
    const onwork = onworkInput.value;
    const offwork = offworkInput.value;

    const [onH, onM] = onwork.split(':').map(Number);
    const [offH, offM] = offwork.split(':').map(Number);

    const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), onH, onM);
    const endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), offH, offM);

    // Past offwork time
    if (now >= endTime) {
      circleTimeEl.textContent = '已下班！';
      circleLabel.textContent = '\u{1F389} 冲！';
      circleProgress.style.strokeDashoffset = '0';
      return;
    }

    // Before onwork time
    if (now < startTime) {
      const remainingMs = endTime - now;
      const remainingSec = Math.floor(remainingMs / 1000);
      const hours = Math.floor(remainingSec / 3600);
      const minutes = Math.floor((remainingSec % 3600) / 60);
      const seconds = remainingSec % 60;

      circleTimeEl.textContent =
        String(hours).padStart(2, '0') + ':' +
        String(minutes).padStart(2, '0') + ':' +
        String(seconds).padStart(2, '0');
      circleLabel.textContent = '下班倒计时';
      circleProgress.style.strokeDashoffset = '0';
      return;
    }

    // During work hours
    const totalWorkMs = endTime - startTime;
    const elapsedMs = now - startTime;
    const remainingMs = endTime - now;

    const progress = Math.min(Math.max(elapsedMs / totalWorkMs, 0), 1);
    const offset = CIRCLE_CIRCUMFERENCE * (1 - progress);
    circleProgress.style.strokeDashoffset = String(offset);

    const remainingSec = Math.floor(remainingMs / 1000);
    const hours = Math.floor(remainingSec / 3600);
    const minutes = Math.floor((remainingSec % 3600) / 60);
    const seconds = remainingSec % 60;

    circleTimeEl.textContent =
      String(hours).padStart(2, '0') + ':' +
      String(minutes).padStart(2, '0') + ':' +
      String(seconds).padStart(2, '0');
    circleLabel.textContent = '下班倒计时';
  }

  // ===== Initialize =====
  populateForm();
  const savedData = loadData();
  if (savedData && savedData.targetAmount && savedData.monthlyAmount && savedData.onworkTime && savedData.offworkTime) {
    showResult();
  }
})();
</script>

</body>
</html>
